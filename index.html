<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-comerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

 <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        E-comerce
      </a>
      <button class="btn btn-cart ms-auto" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCarrito">
        <i class="bi bi-cart3"></i> Carrito
        <span class="badge" id="badge">0</span>
      </button>
    </div>
  </nav>
<section>
  <h1>Productos</h1>
<div class="d-flex flex-wrap justify-content-evenly align-items-center gap-4 w-100 min-vh-100 p-4">

  
 <div class="card" style="width: 11rem;">
  <img src="images/img1.webp" class="card-img-top product-card" alt="...">
  <div class="product-body">
    <h5 class="product-name">Buzo Osito</h5>
    <p class="product-price">$165.800</p>
    <a href="#" class="btn btn-add btn-agregar"
                data-nombre="Buzo Osito"
                data-precio="165.800"
                data-imagen="images/img1.webp">Agregar</a>
  </div>
</div>

 <div class="card" style="width: 11rem;">
  <img src="images/img4.webp" class="card-img-top product-card" alt="...">
  <div class="product-body">
    <h5 class="product-name">Buzo Alana</h5>
    <p class="product-price">$89.000</p>
    <a href="#" class="btn btn-add btn-agregar"
                data-nombre="Buzo Alana"
                data-precio="89.800"
                data-imagen="images/img4.webp">Agregar</a>
  </div>
</div>

 <div class="card" style="width: 11rem;">
  <img src="images/img3.webp" class="card-img-top product-card" alt="...">
  <div class="product-body">
    <h5 class="product-name">Buzo Rosa</h5>
    <p class="product-price">$150.000</p>
    <a href="#" class="btn btn-add btn-agregar"
                data-nombre="Buzo Rosa"
                data-precio="150.800"
                data-imagen="images/img3.webp">Agregar</a>
  </div>
</div>

 <div class="card" style="width: 11rem;">
  <img src="images/img2.webp" class="card-img-top product-card" alt="...">
  <div class="product-body">
    <h5 class="product-name">Buzo Negro</h5>
    <p class="product-price">$138.900</p>
    <a href="#" class="btn btn-add btn-agregar"
                data-nombre="Buzo Negro"
                data-precio="138.900"
                data-imagen="images/img2.webp">Agregar</a>
  </div>
</div>

 <div class="card" style="width: 11rem;">
  <img src="images/img5.webp" class="card-img-top product-card" alt="...">
  <div class="product-body">
    <h5 class="product-name">Buzo Cafe</h5>
    <p class="product-price">$200.000</p>
    <a href="#" class="btn btn-add btn-agregar"
                data-nombre="Buzo Cafe"
                data-precio="200.800"
                data-imagen="images/img5.webp">Agregar</a>
  </div>
</div>



<!-- ===== OFFCANVAS CARRITO ===== -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCarrito">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title"><i class="bi bi-cart3"></i> Tu carrito</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">

      <!-- Lista de ítems -->
      <ul class="cart-list" id="lista-carrito">
        <li id="msg-vacio" class="cart-empty">
          <span></span>
          <p>Tu carrito está vacío</p>
        </li>
      </ul>

      <!-- Footer del carrito -->
      <div class="cart-footer mt-auto">
        <div class="cart-total-row">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-amount" id="total">$0.00</span>
        </div>
        <button class="btn btn-vaciar w-100 mt-3" id="btn-vaciar">
          🗑 Vaciar carrito
        </button>
      </div>

    </div>
  </div>

</div>
</section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
