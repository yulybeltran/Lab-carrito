<!-- ===== OFFCANVAS CARRITO ===== -->
  <div class="carrito">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">🛒 Tu carrito</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">

      <!-- Lista de ítems -->
      <ul class="cart-list" id="lista-carrito">
        <li id="msg-vacio" class="cart-empty">
          <span></span>
          <p>Tu carrito está vacío</p>
        </li>
      </ul>

      <!-- Footer del carrito -->
      <div class="cart-footer mt-auto">
        <div class="cart-total-row">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-amount" id="total">~$0.00</span>
        </div>
        <button class="btn btn-vaciar w-100 mt-3" id="btn-vaciar">
          🗑 Vaciar carrito
        </button>
      </div>

    </div>
  </div>
